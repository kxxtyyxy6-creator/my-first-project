<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>手账日程本</title>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    /* ── 基础重置 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #faf9f7;
      --paper:     #ffffff;
      --border:    #e2ddd6;
      --border-light: #ede9e2;
      --ink:       #3d3530;
      --ink-light: #8a7f77;
      --accent:    #c8a882;
      --today-bg:  #f5f0e8;
      --today-line:#c8a882;
      --hover-bg:  #f7f5f1;
      --sidebar-w: 220px;
      --font-serif: "Hiragino Mincho ProN", "Noto Serif SC", Georgia, serif;
      --font-sans:  "Hiragino Kaku Gothic ProN", "Noto Sans SC", "PingFang SC", system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
    }

    /* 纸纹背景 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        transparent,
        transparent 27px,
        var(--border-light) 27px,
        var(--border-light) 28px
      );
      pointer-events: none;
      opacity: 0.35;
      z-index: 0;
    }

    /* ── 顶部导航 ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      height: 56px;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 18px;
      letter-spacing: .12em;
      color: var(--ink);
      white-space: nowrap;
    }

    .logo span {
      font-size: 11px;
      color: var(--ink-light);
      margin-left: 8px;
      letter-spacing: .08em;
    }

    .tab-group {
      display: flex;
      gap: 2px;
    }

    .tab-btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink-light);
      padding: 5px 18px;
      font-size: 13px;
      font-family: var(--font-sans);
      cursor: pointer;
      letter-spacing: .05em;
      transition: background .15s, color .15s, border-color .15s;
    }

    .tab-btn:first-child { border-radius: 3px 0 0 3px; }
    .tab-btn:last-child  { border-radius: 0 3px 3px 0; }

    .tab-btn.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    /* ── Auth 区域（header 最右） ── */
    .auth-area {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    /* 同步状态徽章 */
    .sync-badge {
      font-size: 11px;
      color: var(--ink-light);
      letter-spacing: .04em;
      white-space: nowrap;
      transition: opacity .3s;
    }

    .sync-badge.syncing { color: var(--accent); }
    .sync-badge.synced  { color: #7aab7a; }

    /* 用户头像 */
    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border);
      object-fit: cover;
      display: block;
      flex-shrink: 0;
    }

    .user-name {
      font-size: 12px;
      color: var(--ink-light);
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .auth-btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink-light);
      font-size: 12px;
      font-family: var(--font-sans);
      padding: 5px 12px;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: .04em;
      white-space: nowrap;
      transition: background .12s, border-color .12s, color .12s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .auth-btn:hover { background: var(--hover-bg); border-color: var(--accent); }

    .auth-btn.signin {
      border-color: #d9d4cc;
      background: #fff;
    }

    .auth-btn.signin:hover {
      border-color: var(--accent);
      background: var(--hover-bg);
    }

    /* Google 图标（SVG inline） */
    .g-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ── 登录遮罩 ── */
    .login-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(250,249,247,.92);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    .login-overlay.hidden { display: none; }

    .login-card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 40px 36px 36px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      max-width: 320px;
      width: 90%;
    }

    .login-card-title {
      font-family: var(--font-serif);
      font-size: 22px;
      letter-spacing: .1em;
      margin-bottom: 8px;
    }

    .login-card-sub {
      font-size: 12px;
      color: var(--ink-light);
      margin-bottom: 28px;
      line-height: 1.7;
    }

    .login-google-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      font-family: var(--font-sans);
      padding: 10px 24px;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: .04em;
      transition: background .12s, border-color .12s, box-shadow .12s;
    }

    .login-google-btn:hover {
      background: var(--hover-bg);
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }

    .login-google-btn .g-icon-lg {
      width: 18px;
      height: 18px;
    }

    /* 加载状态 */
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 150;
      background: rgba(250,249,247,.85);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--ink-light);
      letter-spacing: .06em;
    }

    .loading-overlay.hidden { display: none; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 主体布局 ── */
    main {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
    }

    .view { display: none; }
    .view.active { display: flex; flex: 1; }

    /* ══════════════════════════════
       月视图
    ══════════════════════════════ */
    #month-view {
      flex-direction: row;
      align-items: flex-start;
    }

    .calendar-area {
      flex: 1;
      padding: 24px 28px;
      min-width: 0;
    }

    .month-nav {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 20px;
    }

    .month-title {
      font-family: var(--font-serif);
      font-size: 26px;
      letter-spacing: .06em;
      color: var(--ink);
    }

    .nav-btn {
      border: 1px solid var(--border);
      background: var(--paper);
      color: var(--ink-light);
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      border-radius: 3px;
      transition: background .12s, border-color .12s;
    }

    .nav-btn:hover { background: var(--hover-bg); border-color: var(--accent); }

    .today-btn {
      font-size: 11px;
      padding: 4px 10px;
      height: 28px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink-light);
      cursor: pointer;
      border-radius: 3px;
      letter-spacing: .04em;
      font-family: var(--font-sans);
      transition: background .12s;
    }
    .today-btn:hover { background: var(--hover-bg); }

    .cal-grid {
      width: 100%;
      border-collapse: collapse;
    }

    .cal-grid thead th {
      text-align: center;
      font-size: 11px;
      font-weight: normal;
      letter-spacing: .1em;
      color: var(--ink-light);
      padding: 6px 0 10px;
      border-bottom: 1px solid var(--border);
    }

    .cal-grid thead th:last-child { color: #c0876a; }

    .cal-grid tbody td {
      width: calc(100% / 7);
      height: 90px;
      vertical-align: top;
      border: 1px solid var(--border-light);
      padding: 6px 8px;
      cursor: pointer;
      background: var(--paper);
      transition: background .12s;
      position: relative;
    }

    .cal-grid tbody td:hover { background: var(--hover-bg); }

    .cal-grid tbody td.other-month {
      background: var(--bg);
      opacity: .45;
      cursor: default;
    }

    .cal-grid tbody td.today {
      background: var(--today-bg);
      border-bottom: 2px solid var(--today-line);
    }

    .cal-grid tbody td.selected {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    .day-num {
      font-family: var(--font-serif);
      font-size: 15px;
      line-height: 1;
      display: block;
      margin-bottom: 5px;
    }

    .day-num.sunday { color: #c0876a; }

    .day-note-preview {
      font-size: 11px;
      color: var(--ink-light);
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      white-space: pre-line;
    }

    /* 右：待办侧栏 */
    .todo-sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      padding: 24px 18px;
      background: var(--paper);
      min-height: calc(100vh - 56px);
    }

    .sidebar-title {
      font-family: var(--font-serif);
      font-size: 13px;
      letter-spacing: .12em;
      color: var(--ink-light);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
    }

    .todo-input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }

    .todo-input {
      flex: 1;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 13px;
      padding: 5px 8px;
      border-radius: 3px;
      outline: none;
      transition: border-color .15s;
    }
    .todo-input:focus { border-color: var(--accent); }

    .todo-add-btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink-light);
      width: 28px;
      flex-shrink: 0;
      cursor: pointer;
      border-radius: 3px;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .12s, border-color .12s;
    }
    .todo-add-btn:hover { background: var(--hover-bg); border-color: var(--accent); }

    .todo-list { list-style: none; }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border-light);
    }

    .todo-item input[type="checkbox"] {
      margin-top: 2px;
      accent-color: var(--accent);
      flex-shrink: 0;
      cursor: pointer;
    }

    .todo-item label {
      flex: 1;
      font-size: 13px;
      cursor: pointer;
      word-break: break-all;
      color: var(--ink);
      line-height: 1.5;
    }

    .todo-item.done label {
      text-decoration: line-through;
      color: var(--ink-light);
    }

    .todo-del-btn {
      border: none;
      background: none;
      color: var(--border);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color .12s;
    }
    .todo-del-btn:hover { color: #c0876a; }

    /* 日备注面板 */
    .note-panel {
      position: fixed;
      top: 56px;
      right: var(--sidebar-w);
      width: 0;
      height: calc(100vh - 56px);
      background: var(--paper);
      border-left: 1px solid var(--border);
      z-index: 50;
      overflow: hidden;
      transition: width .22s ease;
      display: flex;
      flex-direction: column;
    }

    .note-panel.open { width: 280px; }

    .note-panel-inner {
      width: 280px;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .note-panel-header {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
    }

    .note-panel-date {
      font-family: var(--font-serif);
      font-size: 17px;
      letter-spacing: .06em;
      flex: 1;
    }

    .note-close-btn {
      border: none;
      background: none;
      color: var(--ink-light);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0 4px;
    }
    .note-close-btn:hover { color: var(--ink); }

    .note-textarea {
      flex: 1;
      border: 1px solid var(--border-light);
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.8;
      padding: 10px 12px;
      resize: none;
      outline: none;
      border-radius: 3px;
      transition: border-color .15s;
    }
    .note-textarea:focus { border-color: var(--accent); }

    .note-save-hint {
      font-size: 11px;
      color: var(--ink-light);
      margin-top: 8px;
      letter-spacing: .04em;
    }

    /* ══════════════════════════════
       周视图
    ══════════════════════════════ */
    #week-view { flex-direction: column; }

    .week-layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .week-nav {
      display: flex;
      align-items: baseline;
      gap: 16px;
      padding: 20px 28px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--paper);
    }

    .week-title {
      font-family: var(--font-serif);
      font-size: 22px;
      letter-spacing: .05em;
    }

    .week-title sub {
      font-size: 12px;
      color: var(--ink-light);
      margin-left: 6px;
      font-family: var(--font-sans);
    }

    .week-days-area {
      flex: 1;
      min-width: 0;
      overflow: auto;
    }

    .week-days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      height: 100%;
      min-height: calc(100vh - 56px - 73px);
      border-right: 1px solid var(--border);
    }

    .week-day-col {
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
    }

    .week-day-col:last-child { border-right: none; }

    .week-day-header {
      padding: 12px 10px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--paper);
      text-align: center;
    }

    .week-day-name {
      font-size: 11px;
      letter-spacing: .1em;
      color: var(--ink-light);
      display: block;
    }

    .week-day-num {
      font-family: var(--font-serif);
      font-size: 22px;
      line-height: 1.1;
      display: block;
    }

    .week-day-col.today .week-day-header {
      background: var(--today-bg);
      border-bottom: 2px solid var(--today-line);
    }

    .week-day-col.sunday .week-day-name,
    .week-day-col.sunday .week-day-num { color: #c0876a; }

    .week-day-textarea {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      resize: none;
      padding: 10px 10px;
      font-family: var(--font-sans);
      font-size: 12.5px;
      line-height: 27px;
      color: var(--ink);
      width: 100%;
    }

    .week-sidebar {
      width: 220px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--paper);
      display: flex;
      flex-direction: column;
      padding: 18px 16px;
    }

    .week-sidebar-title {
      font-family: var(--font-serif);
      font-size: 13px;
      letter-spacing: .1em;
      color: var(--ink-light);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
    }

    .week-note-textarea {
      flex: 1;
      border: 1px solid var(--border-light);
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.8;
      padding: 10px 10px;
      resize: none;
      outline: none;
      border-radius: 3px;
      transition: border-color .15s;
    }
    .week-note-textarea:focus { border-color: var(--accent); }

    .week-note-hint {
      font-size: 11px;
      color: var(--ink-light);
      margin-top: 8px;
    }
  </style>
</head>
<body>

<!-- ── 登录遮罩 ── -->
<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <div class="login-card-title">手账日程本</div>
    <div class="login-card-sub">
      登录后，你的日程数据将同步到云端<br>在任何设备上都能随时访问
    </div>
    <button class="login-google-btn" onclick="signIn()">
      <!-- Google G logo -->
      <svg class="g-icon-lg" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      使用 Google 账号登录
    </button>
  </div>
</div>

<!-- ── 加载中遮罩 ── -->
<div class="loading-overlay hidden" id="loading-overlay">
  <div class="spinner"></div>
  <span>正在加载数据…</span>
</div>

<!-- ── 顶栏 ── -->
<header>
  <div class="logo">手账日程本 <span>PLANNER</span></div>
  <div class="tab-group">
    <button class="tab-btn active" id="btn-month" onclick="switchView('month')">月视图</button>
    <button class="tab-btn"        id="btn-week"  onclick="switchView('week')">周视图</button>
  </div>
  <!-- Auth 区域 -->
  <div class="auth-area" id="auth-area">
    <!-- 由 JS 渲染 -->
  </div>
</header>

<main>

  <!-- ════ 月视图 ════ -->
  <div id="month-view" class="view active">

    <div class="calendar-area">
      <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)" title="上个月">&#8249;</button>
        <button class="nav-btn" onclick="changeMonth(1)"  title="下个月">&#8250;</button>
        <h2 class="month-title" id="month-title"></h2>
        <button class="today-btn" onclick="goToday()">今天</button>
      </div>
      <table class="cal-grid" id="cal-grid">
        <thead>
          <tr>
            <th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th><th>日</th>
          </tr>
        </thead>
        <tbody id="cal-body"></tbody>
      </table>
    </div>

    <aside class="todo-sidebar">
      <div class="sidebar-title" id="todo-title">本月待办</div>
      <div class="todo-input-row">
        <input class="todo-input" id="todo-input" type="text"
               placeholder="添加待办…" maxlength="80"
               onkeydown="if(event.key==='Enter')addTodo()" />
        <button class="todo-add-btn" onclick="addTodo()" title="添加">+</button>
      </div>
      <ul class="todo-list" id="todo-list"></ul>
    </aside>

    <div class="note-panel" id="note-panel">
      <div class="note-panel-inner">
        <div class="note-panel-header">
          <span class="note-panel-date" id="note-panel-date"></span>
          <button class="note-close-btn" onclick="closeNotePanel()" title="关闭">×</button>
        </div>
        <textarea class="note-textarea" id="note-textarea"
                  placeholder="写下今天的安排…"
                  oninput="saveNote()"></textarea>
        <div class="note-save-hint" id="note-save-hint">自动保存</div>
      </div>
    </div>

  </div>

  <!-- ════ 周视图 ════ -->
  <div id="week-view" class="view">

    <div class="week-nav">
      <button class="nav-btn" onclick="changeWeek(-1)" title="上一周">&#8249;</button>
      <button class="nav-btn" onclick="changeWeek(1)"  title="下一周">&#8250;</button>
      <h2 class="week-title" id="week-title"></h2>
      <button class="today-btn" onclick="goToday()">今天</button>
    </div>

    <div class="week-layout">
      <div class="week-days-area">
        <div class="week-days-grid" id="week-days-grid"></div>
      </div>

      <aside class="week-sidebar">
        <div class="week-sidebar-title">本周备注</div>
        <textarea class="week-note-textarea" id="week-note-textarea"
                  placeholder="记录本周计划、反思或其他不限定某天的内容…"
                  oninput="saveWeekNote()"></textarea>
        <div class="week-note-hint">自动保存</div>
      </aside>
    </div>

  </div>

</main>

<script>
/* ════════════════════════════════════════
   Firebase 初始化
════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyCvcnJWQxJYHkpHRq2I1xvWKieJNXDJNG4",
  authDomain: "agenda-cloud-data.firebaseapp.com",
  projectId: "agenda-cloud-data",
  storageBucket: "agenda-cloud-data.firebasestorage.app",
  messagingSenderId: "527842566755",
  appId: "1:527842566755:web:9401f61e28d207cd5a4e56"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

/* ════════════════════════════════════════
   数据层（内存缓存 + 防抖云写入）
════════════════════════════════════════ */
let appData     = { notes: {}, todos: {}, weekNotes: {} };
let currentUser = null;
let saveTimer   = null;

function loadData() {
  return appData;
}

function saveData(data) {
  appData = data;
  if (!currentUser) return;
  clearTimeout(saveTimer);
  setSyncBadge('syncing');
  saveTimer = setTimeout(() => writeToCloud(data), 1500);
}

async function loadDataFromCloud() {
  try {
    const snap = await db.doc(`users/${currentUser.uid}/planner/data`).get();
    appData = snap.exists ? snap.data() : { notes: {}, todos: {}, weekNotes: {} };
    // 确保子对象存在
    appData.notes     = appData.notes     || {};
    appData.todos     = appData.todos     || {};
    appData.weekNotes = appData.weekNotes || {};
  } catch (e) {
    console.error('加载数据失败', e);
    appData = { notes: {}, todos: {}, weekNotes: {} };
  }
}

async function writeToCloud(data) {
  if (!currentUser) return;
  try {
    await db.doc(`users/${currentUser.uid}/planner/data`).set(data);
    setSyncBadge('synced');
  } catch (e) {
    console.error('保存数据失败', e);
    setSyncBadge('error');
  }
}

/* ════════════════════════════════════════
   Auth
════════════════════════════════════════ */
function signIn() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(err => {
    console.error('登录失败', err);
  });
}

function signOut() {
  // 清空防抖，立即写入未保存的数据
  if (saveTimer) {
    clearTimeout(saveTimer);
    writeToCloud(appData);
  }
  auth.signOut();
}

auth.onAuthStateChanged(async user => {
  currentUser = user;
  if (user) {
    showLoadingOverlay(true);
    hideLoginOverlay();
    await loadDataFromCloud();
    showLoadingOverlay(false);
    renderAuthArea(user);
    renderCurrentView();
    setSyncBadge('synced');
  } else {
    appData = { notes: {}, todos: {}, weekNotes: {} };
    renderAuthArea(null);
    showLoginOverlay();
    showLoadingOverlay(false);
  }
});

/* ════════════════════════════════════════
   UI — Auth 区域
════════════════════════════════════════ */
function renderAuthArea(user) {
  const area = document.getElementById('auth-area');
  if (user) {
    area.innerHTML = `
      <span class="sync-badge" id="sync-badge"></span>
      ${user.photoURL
        ? `<img class="user-avatar" src="${escHtml(user.photoURL)}" alt="头像" referrerpolicy="no-referrer">`
        : ''}
      <span class="user-name">${escHtml(user.displayName || user.email || '')}</span>
      <button class="auth-btn" onclick="signOut()" title="退出登录">退出</button>`;
  } else {
    area.innerHTML = `
      <button class="auth-btn signin" onclick="signIn()">
        <svg class="g-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Google 登录
      </button>`;
  }
}

function setSyncBadge(state) {
  const el = document.getElementById('sync-badge');
  if (!el) return;
  if (state === 'syncing') {
    el.className = 'sync-badge syncing';
    el.textContent = '同步中…';
  } else if (state === 'synced') {
    el.className = 'sync-badge synced';
    el.textContent = '已同步 ✓';
    setTimeout(() => { if (el) el.textContent = ''; }, 3000);
  } else if (state === 'error') {
    el.className = 'sync-badge';
    el.textContent = '同步失败';
  }
}

function showLoginOverlay()  { document.getElementById('login-overlay').classList.remove('hidden'); }
function hideLoginOverlay()  { document.getElementById('login-overlay').classList.add('hidden'); }
function showLoadingOverlay(v) {
  document.getElementById('loading-overlay').classList.toggle('hidden', !v);
}

/* ════════════════════════════════════════
   状态
════════════════════════════════════════ */
const today = new Date();
today.setHours(0, 0, 0, 0);

let curYear      = today.getFullYear();
let curMonth     = today.getMonth();
let curWeekStart = getWeekStart(today);
let selectedDate = null;
let curView      = 'month';

/* ════════════════════════════════════════
   工具函数
════════════════════════════════════════ */
function fmtDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtMonthKey(y, m) {
  return `${y}-${String(m+1).padStart(2,'0')}`;
}

function getWeekStart(d) {
  const date = new Date(d);
  date.setHours(0, 0, 0, 0);
  const day  = date.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  return date;
}

function fmtWeekKey(weekStart) {
  const d    = new Date(weekStart);
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const weekNo = Math.ceil((((d - jan1) / 86400000) + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(weekNo).padStart(2,'0')}`;
}

function getISOWeek(d) {
  const date = new Date(d);
  date.setHours(0, 0, 0, 0);
  date.setDate(date.getDate() + 3 - ((date.getDay() + 6) % 7));
  const jan4 = new Date(date.getFullYear(), 0, 4);
  return 1 + Math.round(((date - jan4) / 86400000 - 3 + ((jan4.getDay() + 6) % 7)) / 7);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

const CN_WEEKDAYS = ['一','二','三','四','五','六','日'];
const CN_MONTHS   = ['一月','二月','三月','四月','五月','六月',
                     '七月','八月','九月','十月','十一月','十二月'];

/* ════════════════════════════════════════
   视图切换
════════════════════════════════════════ */
function switchView(v) {
  curView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById(v + '-view').classList.add('active');
  document.getElementById('btn-month').classList.toggle('active', v === 'month');
  document.getElementById('btn-week').classList.toggle('active',  v === 'week');
  renderCurrentView();
}

function renderCurrentView() {
  if (curView === 'month') renderMonth();
  else                     renderWeek();
}

/* ════════════════════════════════════════
   月视图
════════════════════════════════════════ */
function renderMonth() {
  document.getElementById('month-title').textContent =
    `${curYear} 年 ${CN_MONTHS[curMonth]}`;
  document.getElementById('todo-title').textContent =
    `${curMonth+1} 月待办`;

  const data = loadData();
  const body = document.getElementById('cal-body');
  body.innerHTML = '';

  const firstDay    = new Date(curYear, curMonth, 1);
  let   startDow    = firstDay.getDay();
  startDow = (startDow === 0) ? 6 : startDow - 1;

  const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
  const totalCells  = Math.ceil((startDow + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i += 7) {
    const tr = document.createElement('tr');
    for (let j = 0; j < 7; j++) {
      const cellIdx = i + j;
      const dayNum  = cellIdx - startDow + 1;
      const td      = document.createElement('td');

      if (dayNum < 1 || dayNum > daysInMonth) {
        td.classList.add('other-month');
        if (dayNum < 1) {
          const prevLast = new Date(curYear, curMonth, 0).getDate();
          td.innerHTML = `<span class="day-num">${prevLast + dayNum}</span>`;
        } else {
          td.innerHTML = `<span class="day-num">${dayNum - daysInMonth}</span>`;
        }
      } else {
        const d    = new Date(curYear, curMonth, dayNum);
        const key  = fmtDateKey(d);
        const note = data.notes[key] || '';
        const isToday    = d.getTime() === today.getTime();
        const isSunday   = d.getDay() === 0;
        const isSelected = selectedDate && selectedDate.getTime() === d.getTime();

        if (isToday)    td.classList.add('today');
        if (isSelected) td.classList.add('selected');

        td.innerHTML = `
          <span class="day-num${isSunday ? ' sunday' : ''}">${dayNum}</span>
          <div class="day-note-preview">${escHtml(note)}</div>`;

        td.addEventListener('click', () => openNotePanel(d));
      }

      tr.appendChild(td);
    }
    body.appendChild(tr);
  }

  renderTodos();
}

function changeMonth(delta) {
  curMonth += delta;
  if (curMonth > 11) { curMonth = 0;  curYear++; }
  if (curMonth <  0) { curMonth = 11; curYear--; }
  closeNotePanel();
  renderMonth();
}

/* ════════════════════════════════════════
   备注面板
════════════════════════════════════════ */
function openNotePanel(d) {
  selectedDate = d;
  const data = loadData();
  const key  = fmtDateKey(d);

  document.getElementById('note-panel-date').textContent =
    `${d.getMonth()+1} 月 ${d.getDate()} 日`;
  document.getElementById('note-textarea').value = data.notes[key] || '';
  document.getElementById('note-panel').classList.add('open');

  document.querySelectorAll('.cal-grid td').forEach(td => td.classList.remove('selected'));
  document.querySelectorAll('.cal-grid tbody td:not(.other-month)').forEach(td => {
    const numEl = td.querySelector('.day-num');
    if (numEl && parseInt(numEl.textContent) === d.getDate()) {
      td.classList.add('selected');
    }
  });

  document.getElementById('note-textarea').focus();
}

function closeNotePanel() {
  selectedDate = null;
  document.getElementById('note-panel').classList.remove('open');
  document.querySelectorAll('.cal-grid td').forEach(td => td.classList.remove('selected'));
}

function saveNote() {
  if (!selectedDate) return;
  const data = loadData();
  const key  = fmtDateKey(selectedDate);
  const val  = document.getElementById('note-textarea').value;
  if (val.trim()) {
    data.notes[key] = val;
  } else {
    delete data.notes[key];
  }
  saveData(data);
  // 刷新月视图预览
  document.querySelectorAll('.cal-grid tbody td:not(.other-month)').forEach(td => {
    const numEl = td.querySelector('.day-num');
    if (numEl && parseInt(numEl.textContent) === selectedDate.getDate()) {
      const prev = td.querySelector('.day-note-preview');
      if (prev) prev.textContent = val;
    }
  });
}

/* ════════════════════════════════════════
   待办清单
════════════════════════════════════════ */
function addTodo() {
  const input = document.getElementById('todo-input');
  const text  = input.value.trim();
  if (!text) return;

  const data = loadData();
  const mkey = fmtMonthKey(curYear, curMonth);
  if (!data.todos[mkey]) data.todos[mkey] = [];
  data.todos[mkey].push({ id: Date.now(), text, done: false });
  saveData(data);
  input.value = '';
  renderTodos();
}

function toggleTodo(mkey, id) {
  const data = loadData();
  const item = (data.todos[mkey] || []).find(t => t.id === id);
  if (item) item.done = !item.done;
  saveData(data);
  renderTodos();
}

function deleteTodo(mkey, id) {
  const data = loadData();
  if (data.todos[mkey]) {
    data.todos[mkey] = data.todos[mkey].filter(t => t.id !== id);
  }
  saveData(data);
  renderTodos();
}

function renderTodos() {
  const data  = loadData();
  const mkey  = fmtMonthKey(curYear, curMonth);
  const items = data.todos[mkey] || [];
  const ul    = document.getElementById('todo-list');
  ul.innerHTML = '';

  items.forEach(item => {
    const li = document.createElement('li');
    li.className = 'todo-item' + (item.done ? ' done' : '');
    li.innerHTML = `
      <input type="checkbox" id="t${item.id}" ${item.done ? 'checked' : ''}
             onchange="toggleTodo('${mkey}', ${item.id})">
      <label for="t${item.id}">${escHtml(item.text)}</label>
      <button class="todo-del-btn" onclick="deleteTodo('${mkey}', ${item.id})" title="删除">×</button>`;
    ul.appendChild(li);
  });
}

/* ════════════════════════════════════════
   周视图
════════════════════════════════════════ */
function renderWeek() {
  const ws = curWeekStart;
  const we = new Date(ws); we.setDate(we.getDate() + 6);

  const fmtD = d => `${d.getMonth()+1}月${d.getDate()}日`;
  document.getElementById('week-title').innerHTML =
    `${ws.getFullYear()} 年 第 ${getISOWeek(ws)} 周 <sub>${fmtD(ws)} — ${fmtD(we)}</sub>`;

  const data = loadData();
  const grid = document.getElementById('week-days-grid');
  grid.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d        = new Date(ws); d.setDate(ws.getDate() + i);
    const key      = fmtDateKey(d);
    const isToday  = d.getTime() === today.getTime();
    const isSunday = d.getDay() === 0;

    const col = document.createElement('div');
    col.className = 'week-day-col' +
                    (isToday  ? ' today'  : '') +
                    (isSunday ? ' sunday' : '');

    col.innerHTML = `
      <div class="week-day-header">
        <span class="week-day-name">周${CN_WEEKDAYS[i]}</span>
        <span class="week-day-num">${d.getDate()}</span>
      </div>
      <textarea class="week-day-textarea"
                placeholder="今日安排…"
                data-key="${key}"
                oninput="saveDayNote(this)">${escHtml(data.notes[key] || '')}</textarea>`;

    grid.appendChild(col);
  }

  const wkey = fmtWeekKey(ws);
  document.getElementById('week-note-textarea').value       = data.weekNotes[wkey] || '';
  document.getElementById('week-note-textarea').dataset.key = wkey;
}

function saveDayNote(textarea) {
  const data = loadData();
  const key  = textarea.dataset.key;
  const val  = textarea.value;
  if (val.trim()) {
    data.notes[key] = val;
  } else {
    delete data.notes[key];
  }
  saveData(data);
}

function saveWeekNote() {
  const ta  = document.getElementById('week-note-textarea');
  const data = loadData();
  const key  = ta.dataset.key;
  if (!key) return;
  const val  = ta.value;
  if (val.trim()) {
    data.weekNotes[key] = val;
  } else {
    delete data.weekNotes[key];
  }
  saveData(data);
}

function changeWeek(delta) {
  curWeekStart = new Date(curWeekStart);
  curWeekStart.setDate(curWeekStart.getDate() + delta * 7);
  renderWeek();
}

/* ════════════════════════════════════════
   通用导航
════════════════════════════════════════ */
function goToday() {
  curYear      = today.getFullYear();
  curMonth     = today.getMonth();
  curWeekStart = getWeekStart(today);
  closeNotePanel();
  renderCurrentView();
}

/* ── 初始化（Auth 状态监听器会触发渲染） ── */
renderAuthArea(null); // 先渲染未登录状态
</script>
</body>
</html>
