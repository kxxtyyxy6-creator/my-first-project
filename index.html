<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>手账日程本</title>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <!-- SheetJS for Excel import -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    /* ── 基础重置 ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #faf9f7;
      --paper:     #ffffff;
      --border:    #e2ddd6;
      --border-light: #ede9e2;
      --ink:       #3d3530;
      --ink-light: #8a7f77;
      --accent:    #c8a882;
      --today-bg:  #f5f0e8;
      --today-line:#c8a882;
      --hover-bg:  #f7f5f1;
      --sidebar-w: 220px;
      --font-serif: "Hiragino Mincho ProN", "Noto Serif SC", Georgia, serif;
      --font-sans:  "Hiragino Kaku Gothic ProN", "Noto Sans SC", "PingFang SC", system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 14px;
      line-height: 1.6;
    }

    /* 纸纹背景 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        transparent,
        transparent 27px,
        var(--border-light) 27px,
        var(--border-light) 28px
      );
      pointer-events: none;
      opacity: 0.35;
      z-index: 0;
    }

    /* ── 顶部导航 ── */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--paper);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      height: 56px;
      box-shadow: 0 1px 4px rgba(0,0,0,.05);
    }

    .logo {
      font-family: var(--font-serif);
      font-size: 18px;
      letter-spacing: .12em;
      color: var(--ink);
      white-space: nowrap;
    }

    .logo span {
      font-size: 11px;
      color: var(--ink-light);
      margin-left: 8px;
      letter-spacing: .08em;
    }

    .tab-group {
      display: flex;
      gap: 2px;
    }

    .tab-btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink-light);
      padding: 5px 18px;
      font-size: 13px;
      font-family: var(--font-sans);
      cursor: pointer;
      letter-spacing: .05em;
      transition: background .15s, color .15s, border-color .15s;
    }

    .tab-btn:first-child { border-radius: 3px 0 0 3px; }
    .tab-btn:last-child  { border-radius: 0 3px 3px 0; }

    .tab-btn.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    /* ── Auth 区域（header 最右） ── */
    .auth-area {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    /* 同步状态徽章 */
    .sync-badge {
      font-size: 11px;
      color: var(--ink-light);
      letter-spacing: .04em;
      white-space: nowrap;
      transition: opacity .3s;
    }

    .sync-badge.syncing { color: var(--accent); }
    .sync-badge.synced  { color: #7aab7a; }

    /* 用户头像 */
    .user-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1px solid var(--border);
      object-fit: cover;
      display: block;
      flex-shrink: 0;
    }

    .user-name {
      font-size: 12px;
      color: var(--ink-light);
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .auth-btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink-light);
      font-size: 12px;
      font-family: var(--font-sans);
      padding: 5px 12px;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: .04em;
      white-space: nowrap;
      transition: background .12s, border-color .12s, color .12s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .auth-btn:hover { background: var(--hover-bg); border-color: var(--accent); }

    .auth-btn.signin {
      border-color: #d9d4cc;
      background: #fff;
    }

    .auth-btn.signin:hover {
      border-color: var(--accent);
      background: var(--hover-bg);
    }

    /* Google 图标（SVG inline） */
    .g-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    /* ── 登录遮罩 ── */
    .login-overlay {
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(250,249,247,.92);
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    .login-overlay.hidden { display: none; }

    .login-card {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 40px 36px 36px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      max-width: 320px;
      width: 90%;
    }

    .login-card-title {
      font-family: var(--font-serif);
      font-size: 22px;
      letter-spacing: .1em;
      margin-bottom: 8px;
    }

    .login-card-sub {
      font-size: 12px;
      color: var(--ink-light);
      margin-bottom: 28px;
      line-height: 1.7;
    }

    .login-google-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--ink);
      font-size: 13px;
      font-family: var(--font-sans);
      padding: 10px 24px;
      border-radius: 3px;
      cursor: pointer;
      letter-spacing: .04em;
      transition: background .12s, border-color .12s, box-shadow .12s;
    }

    .login-google-btn:hover {
      background: var(--hover-bg);
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }

    .login-google-btn .g-icon-lg {
      width: 18px;
      height: 18px;
    }

    /* 加载状态 */
    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 150;
      background: rgba(250,249,247,.85);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--ink-light);
      letter-spacing: .06em;
    }

    .loading-overlay.hidden { display: none; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 主体布局 ── */
    main {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 56px);
      display: flex;
      flex-direction: column;
    }

    .view { display: none; }
    .view.active { display: flex; flex: 1; }

    /* ══════════════════════════════
       月视图
    ══════════════════════════════ */
    #month-view {
      flex-direction: row;
      align-items: flex-start;
    }

    .calendar-area {
      flex: 1;
      padding: 24px 28px;
      min-width: 0;
    }

    .month-nav {
      display: flex;
      align-items: baseline;
      gap: 16px;
      margin-bottom: 20px;
    }

    .month-title {
      font-family: var(--font-serif);
      font-size: 26px;
      letter-spacing: .06em;
      color: var(--ink);
    }

    .nav-btn {
      border: 1px solid var(--border);
      background: var(--paper);
      color: var(--ink-light);
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 14px;
      border-radius: 3px;
      transition: background .12s, border-color .12s;
    }

    .nav-btn:hover { background: var(--hover-bg); border-color: var(--accent); }

    .today-btn {
      font-size: 11px;
      padding: 4px 10px;
      height: 28px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink-light);
      cursor: pointer;
      border-radius: 3px;
      letter-spacing: .04em;
      font-family: var(--font-sans);
      transition: background .12s;
    }
    .today-btn:hover { background: var(--hover-bg); }

    .cal-grid {
      width: 100%;
      border-collapse: collapse;
    }

    .cal-grid thead th {
      text-align: center;
      font-size: 11px;
      font-weight: normal;
      letter-spacing: .1em;
      color: var(--ink-light);
      padding: 6px 0 10px;
      border-bottom: 1px solid var(--border);
    }

    .cal-grid thead th:last-child { color: #c0876a; }

    .cal-grid tbody td {
      width: calc(100% / 7);
      height: 90px;
      vertical-align: top;
      border: 1px solid var(--border-light);
      padding: 6px 8px;
      cursor: pointer;
      background: var(--paper);
      transition: background .12s;
      position: relative;
    }

    .cal-grid tbody td:hover { background: var(--hover-bg); }

    .cal-grid tbody td.other-month {
      background: var(--bg);
      opacity: .45;
      cursor: default;
    }

    .cal-grid tbody td.today {
      background: var(--today-bg);
      border-bottom: 2px solid var(--today-line);
    }

    .cal-grid tbody td.selected {
      outline: 2px solid var(--accent);
      outline-offset: -2px;
    }

    .day-num {
      font-family: var(--font-serif);
      font-size: 15px;
      line-height: 1;
      display: block;
      margin-bottom: 5px;
    }

    .day-num.sunday { color: #c0876a; }

    .day-note-preview {
      font-size: 11px;
      color: var(--ink-light);
      line-height: 1.4;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      white-space: pre-line;
    }

    /* 右：待办侧栏 */
    .todo-sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      padding: 24px 18px;
      background: var(--paper);
      min-height: calc(100vh - 56px);
    }

    .sidebar-title {
      font-family: var(--font-serif);
      font-size: 13px;
      letter-spacing: .12em;
      color: var(--ink-light);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
    }

    .todo-input-row {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }

    .todo-input {
      flex: 1;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 13px;
      padding: 5px 8px;
      border-radius: 3px;
      outline: none;
      transition: border-color .15s;
    }
    .todo-input:focus { border-color: var(--accent); }

    .todo-add-btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink-light);
      width: 28px;
      flex-shrink: 0;
      cursor: pointer;
      border-radius: 3px;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .12s, border-color .12s;
    }
    .todo-add-btn:hover { background: var(--hover-bg); border-color: var(--accent); }

    .todo-list { list-style: none; }

    .todo-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border-light);
    }

    .todo-item input[type="checkbox"] {
      margin-top: 2px;
      accent-color: var(--accent);
      flex-shrink: 0;
      cursor: pointer;
    }

    .todo-item label {
      flex: 1;
      font-size: 13px;
      cursor: pointer;
      word-break: break-all;
      color: var(--ink);
      line-height: 1.5;
    }

    .todo-item.done label {
      text-decoration: line-through;
      color: var(--ink-light);
    }

    .todo-del-btn {
      border: none;
      background: none;
      color: var(--border);
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color .12s;
    }
    .todo-del-btn:hover { color: #c0876a; }

    /* 日备注面板 */
    .note-panel {
      position: fixed;
      top: 56px;
      right: var(--sidebar-w);
      width: 0;
      height: calc(100vh - 56px);
      background: var(--paper);
      border-left: 1px solid var(--border);
      z-index: 50;
      overflow: hidden;
      transition: width .22s ease;
      display: flex;
      flex-direction: column;
    }

    .note-panel.open { width: 280px; }

    .note-panel-inner {
      width: 280px;
      padding: 20px 18px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .note-panel-header {
      display: flex;
      align-items: center;
      margin-bottom: 14px;
    }

    .note-panel-date {
      font-family: var(--font-serif);
      font-size: 17px;
      letter-spacing: .06em;
      flex: 1;
    }

    .note-close-btn {
      border: none;
      background: none;
      color: var(--ink-light);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      padding: 0 4px;
    }
    .note-close-btn:hover { color: var(--ink); }

    .note-textarea {
      flex: 1;
      border: 1px solid var(--border-light);
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.8;
      padding: 10px 12px;
      resize: none;
      outline: none;
      border-radius: 3px;
      transition: border-color .15s;
    }
    .note-textarea:focus { border-color: var(--accent); }

    .note-save-hint {
      font-size: 11px;
      color: var(--ink-light);
      margin-top: 8px;
      letter-spacing: .04em;
    }

    /* ══════════════════════════════
       周视图
    ══════════════════════════════ */
    #week-view { flex-direction: column; }

    .week-layout {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .week-nav {
      display: flex;
      align-items: baseline;
      gap: 16px;
      padding: 20px 28px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--paper);
    }

    .week-title {
      font-family: var(--font-serif);
      font-size: 22px;
      letter-spacing: .05em;
    }

    .week-title sub {
      font-size: 12px;
      color: var(--ink-light);
      margin-left: 6px;
      font-family: var(--font-sans);
    }

    .week-days-area {
      flex: 1;
      min-width: 0;
      overflow: auto;
    }

    .week-days-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      height: 100%;
      min-height: calc(100vh - 56px - 73px);
      border-right: 1px solid var(--border);
    }

    .week-day-col {
      border-right: 1px solid var(--border-light);
      display: flex;
      flex-direction: column;
    }

    .week-day-col:last-child { border-right: none; }

    .week-day-header {
      padding: 12px 10px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--paper);
      text-align: center;
    }

    .week-day-name {
      font-size: 11px;
      letter-spacing: .1em;
      color: var(--ink-light);
      display: block;
    }

    .week-day-num {
      font-family: var(--font-serif);
      font-size: 22px;
      line-height: 1.1;
      display: block;
    }

    .week-day-col.today .week-day-header {
      background: var(--today-bg);
      border-bottom: 2px solid var(--today-line);
    }

    .week-day-col.sunday .week-day-name,
    .week-day-col.sunday .week-day-num { color: #c0876a; }

    .week-day-textarea {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      resize: none;
      padding: 10px 10px;
      font-family: var(--font-sans);
      font-size: 12.5px;
      line-height: 27px;
      color: var(--ink);
      width: 100%;
    }

    .week-sidebar {
      width: 220px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
      background: var(--paper);
      display: flex;
      flex-direction: column;
      padding: 18px 16px;
    }

    .week-sidebar-title {
      font-family: var(--font-serif);
      font-size: 13px;
      letter-spacing: .1em;
      color: var(--ink-light);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-light);
    }

    .week-note-textarea {
      flex: 1;
      border: 1px solid var(--border-light);
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-sans);
      font-size: 13px;
      line-height: 1.8;
      padding: 10px 10px;
      resize: none;
      outline: none;
      border-radius: 3px;
      transition: border-color .15s;
    }
    .week-note-textarea:focus { border-color: var(--accent); }

    .week-note-hint {
      font-size: 11px;
      color: var(--ink-light);
      margin-top: 8px;
    }

    /* ══════════════════════════════
       求职追踪视图
    ══════════════════════════════ */
    #job-view { flex-direction: column; }
    .job-stats-bar { display: flex; background: var(--paper); border-bottom: 1px solid var(--border); flex-shrink: 0; flex-wrap: wrap; }
    .job-stat-item { padding: 14px 20px; border-right: 1px solid var(--border-light); text-align: center; min-width: 88px; }
    .job-stat-num { font-family: var(--font-serif); font-size: 22px; display: block; color: var(--ink); line-height: 1; margin-bottom: 4px; }
    .job-stat-label { font-size: 11px; color: var(--ink-light); letter-spacing: .08em; display: block; }
    .job-body { display: flex; flex: 1; min-height: 0; overflow: hidden; }
    .job-main-area { flex: 1; min-width: 0; overflow-y: auto; padding: 20px 24px; display: flex; flex-direction: column; }
    .job-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .job-add-btn { border: 1px solid var(--accent); background: var(--accent); color: #fff; font-size: 12px; font-family: var(--font-sans); padding: 6px 14px; border-radius: 3px; cursor: pointer; letter-spacing: .04em; transition: opacity .15s; }
    .job-add-btn:hover { opacity: .85; }
    .job-import-btn { border: 1px solid var(--border); background: var(--paper); color: var(--ink-light); font-size: 12px; font-family: var(--font-sans); padding: 6px 12px; border-radius: 3px; cursor: pointer; letter-spacing: .04em; transition: background .15s, border-color .15s; }
    .job-import-btn:hover { background: var(--hover-bg); border-color: var(--accent); }
    .job-filter-select { border: 1px solid var(--border); background: var(--paper); color: var(--ink-light); font-size: 12px; font-family: var(--font-sans); padding: 5px 8px; border-radius: 3px; cursor: pointer; outline: none; transition: border-color .12s; }
    .job-filter-select:focus { border-color: var(--accent); }

    /* ── 公司卡片 ── */
    .co-card { background: var(--paper); border: 1px solid var(--border-light); border-left: 3px solid var(--border); border-radius: 3px; margin-bottom: 10px; overflow: hidden; }
    .co-card[data-priority="高"] { border-left-color: #c0876a; }
    .co-card[data-priority="中"] { border-left-color: var(--accent); }
    .co-card[data-priority="低"] { border-left-color: #b0c4b0; }
    .co-card-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; user-select: none; }
    .co-card-header:hover { background: var(--hover-bg); }
    .co-name { font-family: var(--font-serif); font-size: 15px; color: var(--ink); flex-shrink: 0; }
    .co-url-link { color: var(--ink-light); text-decoration: none; font-size: 14px; flex-shrink: 0; opacity: .65; transition: opacity .12s, color .12s; }
    .co-url-link:hover { opacity: 1; color: var(--accent); }
    .co-priority-tag { font-size: 10px; padding: 1px 7px; border-radius: 9px; border: 1px solid var(--border); color: var(--ink-light); cursor: pointer; flex-shrink: 0; letter-spacing: .04em; transition: background .12s; }
    .co-priority-tag:hover { background: var(--today-bg); }
    .co-priority-tag[data-p="高"] { border-color: #c0876a; color: #c0876a; }
    .co-priority-tag[data-p="中"] { border-color: var(--accent); color: var(--accent); }
    .co-summary { flex: 1; font-size: 11px; color: var(--ink-light); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .co-expand-arrow { font-size: 11px; color: var(--ink-light); flex-shrink: 0; transition: transform .2s; }
    .co-card.expanded .co-expand-arrow { transform: rotate(90deg); }
    .co-card-body { display: none; border-top: 1px solid var(--border-light); padding: 14px; }
    .co-card.expanded > .co-card-body { display: block; }
    .co-notes-label { font-size: 11px; color: var(--ink-light); letter-spacing: .06em; margin-bottom: 4px; display: block; }
    .co-notes-ta { width: 100%; border: 1px solid var(--border-light); background: var(--bg); color: var(--ink); font-family: var(--font-sans); font-size: 12px; line-height: 1.7; padding: 6px 8px; resize: vertical; min-height: 44px; outline: none; border-radius: 3px; transition: border-color .15s; margin-bottom: 12px; }
    .co-notes-ta:focus { border-color: var(--accent); }
    .co-action-row { display: flex; gap: 8px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-light); align-items: center; }

    /* ── 岗位子卡片 ── */
    .pos-list { display: flex; flex-direction: column; gap: 6px; }
    .pos-card { border: 1px solid var(--border-light); border-radius: 3px; overflow: hidden; background: var(--bg); }
    .pos-card-header { display: flex; align-items: center; gap: 8px; padding: 9px 12px; cursor: pointer; user-select: none; flex-wrap: wrap; }
    .pos-card-header:hover { background: var(--hover-bg); }
    .pos-title { font-size: 13px; color: var(--ink); font-weight: 500; flex-shrink: 0; }
    .pos-city { font-size: 11px; color: var(--ink-light); flex-shrink: 0; }
    .pos-sbadge { font-size: 10px; padding: 1px 6px; border-radius: 9px; border: 1px solid var(--border); color: var(--ink-light); flex-shrink: 0; letter-spacing: .04em; }
    .pos-sbadge.s-interviewing { border-color: var(--accent); color: var(--accent); }
    .pos-sbadge.s-offer        { border-color: #7aab7a; color: #7aab7a; }
    .pos-sbadge.s-rejected     { border-color: #c0876a; color: #c0876a; opacity: .75; }
    .pos-deadline-tag { font-size: 11px; color: var(--ink-light); flex-shrink: 0; }
    .pos-deadline-tag.urgent  { color: #c0876a; font-weight: 500; }
    .pos-deadline-tag.expired { color: #b96060; }
    .pos-date { font-size: 11px; color: var(--ink-light); margin-left: auto; flex-shrink: 0; }
    .pos-card-detail { display: none; border-top: 1px solid var(--border-light); padding: 12px 12px 14px; background: var(--paper); }
    .pos-card.expanded > .pos-card-detail { display: block; }
    .pos-card-btns { display: flex; gap: 8px; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border-light); }

    /* ── 共用详情样式 ── */
    .job-detail-head { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
    .job-status-select { border: 1px solid var(--border); background: var(--bg); color: var(--ink-light); font-size: 12px; font-family: var(--font-sans); padding: 3px 6px; border-radius: 3px; cursor: pointer; outline: none; }
    .job-sect-title { font-family: var(--font-serif); font-size: 12px; letter-spacing: .1em; color: var(--ink-light); padding-top: 12px; padding-bottom: 7px; border-bottom: 1px solid var(--border-light); margin-bottom: 8px; }
    .job-int-row { display: flex; align-items: flex-start; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border-light); flex-wrap: wrap; }
    .job-int-round { font-family: var(--font-serif); font-size: 13px; color: var(--accent); min-width: 32px; flex-shrink: 0; }
    .job-int-info { flex: 1; font-size: 12px; color: var(--ink); }
    .job-int-actions { display: flex; gap: 8px; align-items: center; }
    .job-debrief-btn { font-size: 11px; color: var(--ink-light); background: none; border: none; cursor: pointer; padding: 0; letter-spacing: .04em; text-decoration: underline; }
    .job-debrief-btn:hover { color: var(--accent); }
    .job-del-btn { border: none; background: none; color: var(--border); cursor: pointer; font-size: 13px; padding: 0 2px; line-height: 1; transition: color .12s; }
    .job-del-btn:hover { color: #c0876a; }
    .job-debrief { margin-top: 8px; background: var(--bg); border: 1px solid var(--border-light); border-radius: 3px; padding: 10px 12px; display: none; width: 100%; }
    .job-debrief.open { display: block; }
    .job-debrief-field { margin-bottom: 8px; }
    .job-debrief-label { font-size: 11px; color: var(--ink-light); letter-spacing: .06em; margin-bottom: 3px; display: block; }
    .job-debrief-ta { width: 100%; border: 1px solid var(--border-light); background: var(--paper); color: var(--ink); font-family: var(--font-sans); font-size: 12px; line-height: 1.7; padding: 6px 8px; resize: vertical; min-height: 48px; outline: none; border-radius: 3px; transition: border-color .15s; }
    .job-debrief-ta:focus { border-color: var(--accent); }
    .job-offer-info { background: #fef8f0; border: 1px solid #e8d8c0; border-radius: 3px; padding: 12px 14px; margin-top: 8px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px 16px; }
    .job-offer-f { display: flex; flex-direction: column; gap: 2px; }
    .job-offer-fl { font-size: 10px; color: var(--ink-light); letter-spacing: .06em; }
    .job-offer-fv { font-size: 13px; color: var(--ink); }
    .job-notes-ta { width: 100%; border: 1px solid var(--border-light); background: var(--bg); color: var(--ink); font-family: var(--font-sans); font-size: 12px; line-height: 1.7; padding: 6px 8px; resize: vertical; min-height: 44px; outline: none; border-radius: 3px; margin-top: 4px; transition: border-color .15s; }
    .job-notes-ta:focus { border-color: var(--accent); }
    .job-add-int-btn { font-size: 12px; color: var(--accent); border: 1px dashed var(--accent); background: transparent; padding: 5px 12px; border-radius: 3px; cursor: pointer; letter-spacing: .04em; margin-top: 8px; font-family: var(--font-sans); transition: background .12s; }
    .job-add-int-btn:hover { background: var(--today-bg); }
    .job-card-btn { font-size: 11px; border: 1px solid var(--border); background: transparent; color: var(--ink-light); padding: 4px 10px; border-radius: 3px; cursor: pointer; font-family: var(--font-sans); transition: background .12s; }
    .job-card-btn:hover { background: var(--hover-bg); }
    .job-card-btn.danger:hover { border-color: #c0876a; color: #c0876a; }

    /* ── Offer 对比 & 侧栏 ── */
    .job-offer-cmp { margin-top: 20px; background: var(--paper); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; }
    .job-offer-cmp-title { font-family: var(--font-serif); font-size: 13px; letter-spacing: .1em; color: var(--ink-light); padding: 10px 14px; border-bottom: 1px solid var(--border); background: var(--bg); }
    .job-offer-table { width: 100%; border-collapse: collapse; }
    .job-offer-table th, .job-offer-table td { padding: 8px 12px; border: 1px solid var(--border-light); font-size: 12px; text-align: left; }
    .job-offer-table th { background: var(--bg); font-weight: normal; font-family: var(--font-serif); color: var(--ink-light); letter-spacing: .06em; width: 80px; }
    .job-offer-table td { color: var(--ink); }
    .job-sidebar { width: var(--sidebar-w); flex-shrink: 0; border-left: 1px solid var(--border); background: var(--paper); padding: 20px 16px; overflow-y: auto; display: flex; flex-direction: column; }
    .job-deadline-item { padding: 6px 0; border-bottom: 1px solid var(--border-light); font-size: 12px; color: var(--ink-light); line-height: 1.5; }
    .job-deadline-item.urgent  { color: #c0876a; }
    .job-deadline-item.expired { color: #b96060; }
    .job-deadline-days { font-size: 11px; letter-spacing: .03em; }

    /* ── 模态框 ── */
    .job-modal-overlay { position: fixed; inset: 0; z-index: 120; background: rgba(250,249,247,.9); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
    .job-modal-overlay.hidden { display: none; }
    .job-modal { background: var(--paper); border: 1px solid var(--border); border-radius: 6px; padding: 26px 26px 22px; width: 500px; max-width: 94vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    .job-modal-title { font-family: var(--font-serif); font-size: 18px; letter-spacing: .08em; margin-bottom: 18px; }
    .job-form-row { display: flex; gap: 12px; margin-bottom: 12px; }
    .job-form-field { display: flex; flex-direction: column; gap: 4px; flex: 1; }
    .job-form-label { font-size: 11px; color: var(--ink-light); letter-spacing: .06em; }
    .job-form-input, .job-form-select { border: 1px solid var(--border); background: var(--bg); color: var(--ink); font-family: var(--font-sans); font-size: 13px; padding: 6px 8px; border-radius: 3px; outline: none; transition: border-color .15s; }
    .job-form-input:focus, .job-form-select:focus { border-color: var(--accent); }
    .job-offer-sect-head { font-family: var(--font-serif); font-size: 12px; letter-spacing: .1em; color: var(--ink-light); margin: 8px 0 10px; padding-bottom: 6px; border-bottom: 1px solid var(--border-light); }
    .job-modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; padding-top: 12px; border-top: 1px solid var(--border-light); }
    .job-modal-cancel { border: 1px solid var(--border); background: transparent; color: var(--ink-light); font-size: 13px; font-family: var(--font-sans); padding: 6px 14px; border-radius: 3px; cursor: pointer; transition: background .12s; }
    .job-modal-cancel:hover { background: var(--hover-bg); }
    .job-modal-save { border: 1px solid var(--accent); background: var(--accent); color: #fff; font-size: 13px; font-family: var(--font-sans); padding: 6px 16px; border-radius: 3px; cursor: pointer; transition: opacity .15s; }
    .job-modal-save:hover { opacity: .85; }
    .co-match-hint { font-size: 12px; color: var(--accent); background: #fef8f0; border: 1px solid #e8d8c0; border-radius: 3px; padding: 8px 12px; margin-bottom: 10px; display: none; }
    .co-match-hint.show { display: block; }
    .import-preview-list { max-height: 300px; overflow-y: auto; border: 1px solid var(--border-light); border-radius: 3px; margin: 10px 0; }
    .import-preview-row { display: flex; align-items: center; gap: 10px; padding: 7px 12px; border-bottom: 1px solid var(--border-light); font-size: 12px; }
    .import-preview-row:last-child { border-bottom: none; }
    .import-preview-co { font-weight: 500; color: var(--ink); min-width: 80px; }
    .import-preview-pos { color: var(--ink-light); flex: 1; }
    .import-preview-dup { font-size: 11px; color: #c0876a; }

    /* ── 拖动分割线 ── */
    .v-divider { width: 5px; cursor: col-resize; background: transparent; flex-shrink: 0; position: relative; z-index: 10; transition: background .15s; }
    .v-divider:hover, .v-divider.dragging { background: var(--accent); opacity: .4; }

    /* ── 月视图 待办数量徽章 ── */
    .day-todo-count { font-size: 10px; color: var(--accent); margin-top: 2px; letter-spacing: .02em; }

    /* ── 笔记面板 每日待办区域 ── */
    .np-todo-area { flex-shrink: 0; border-top: 1px solid var(--border-light); padding-top: 12px; margin-top: 12px; display: flex; flex-direction: column; min-height: 0; max-height: 38vh; }
    .np-todo-title { font-family: var(--font-serif); font-size: 11px; letter-spacing: .1em; color: var(--ink-light); margin-bottom: 8px; }
    .np-todo-input-row { display: flex; gap: 5px; margin-bottom: 8px; flex-shrink: 0; }
    .np-todo-input { flex: 1; border: 1px solid var(--border-light); background: var(--bg); color: var(--ink); font-family: var(--font-sans); font-size: 12px; padding: 4px 7px; border-radius: 3px; outline: none; transition: border-color .15s; }
    .np-todo-input:focus { border-color: var(--accent); }
    .np-todo-list { list-style: none; overflow-y: auto; flex: 1; }
    .np-todo-item { display: flex; align-items: flex-start; gap: 6px; padding: 5px 0; border-bottom: 1px solid var(--border-light); }
    .np-todo-item:last-child { border-bottom: none; }
    .np-todo-item input { accent-color: var(--accent); flex-shrink: 0; margin-top: 2px; cursor: pointer; }
    .np-todo-item label { flex: 1; cursor: pointer; color: var(--ink); word-break: break-all; line-height: 1.4; font-size: 12px; }
    .np-todo-item.done label { text-decoration: line-through; color: var(--ink-light); }
    .np-todo-del { border: none; background: none; color: var(--border); cursor: pointer; font-size: 13px; line-height: 1; padding: 0 2px; flex-shrink: 0; transition: color .12s; }
    .np-todo-del:hover { color: #c0876a; }

    /* ── 周视图 每日待办区域 ── */
    .week-day-todo-area { border-top: 1px solid var(--border-light); padding: 5px 8px 7px; background: var(--bg); flex-shrink: 0; }
    .week-day-todo-input-row { display: flex; gap: 3px; margin-bottom: 4px; }
    .week-day-todo-input { flex: 1; border: 1px solid var(--border-light); background: var(--paper); color: var(--ink); font-family: var(--font-sans); font-size: 11px; padding: 3px 5px; border-radius: 3px; outline: none; min-width: 0; transition: border-color .15s; }
    .week-day-todo-input:focus { border-color: var(--accent); }
    .week-day-todo-add { border: 1px solid var(--border); background: transparent; color: var(--ink-light); width: 20px; height: 20px; flex-shrink: 0; cursor: pointer; border-radius: 3px; font-size: 15px; display: flex; align-items: center; justify-content: center; padding: 0; transition: background .12s; }
    .week-day-todo-add:hover { background: var(--hover-bg); }
    .week-day-todo-list { list-style: none; max-height: 72px; overflow-y: auto; }
    .week-day-todo-item { display: flex; align-items: flex-start; gap: 4px; padding: 2px 0; border-bottom: 1px solid var(--border-light); }
    .week-day-todo-item:last-child { border-bottom: none; }
    .week-day-todo-item input { accent-color: var(--accent); flex-shrink: 0; margin-top: 2px; cursor: pointer; }
    .week-day-todo-item label { flex: 1; cursor: pointer; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; }
    .week-day-todo-item.done label { text-decoration: line-through; color: var(--ink-light); }
    .week-day-todo-del { border: none; background: none; color: var(--border); cursor: pointer; font-size: 11px; line-height: 1; padding: 0; flex-shrink: 0; transition: color .12s; }
    .week-day-todo-del:hover { color: #c0876a; }
  </style>
</head>
<body>

<!-- ── 登录遮罩 ── -->
<div class="login-overlay" id="login-overlay">
  <div class="login-card">
    <div class="login-card-title">手账日程本</div>
    <div class="login-card-sub">
      登录后，你的日程数据将同步到云端<br>在任何设备上都能随时访问
    </div>
    <button class="login-google-btn" onclick="signIn()">
      <!-- Google G logo -->
      <svg class="g-icon-lg" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
        <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      使用 Google 账号登录
    </button>
  </div>
</div>

<!-- ── 加载中遮罩 ── -->
<div class="loading-overlay hidden" id="loading-overlay">
  <div class="spinner"></div>
  <span>正在加载数据…</span>
</div>

<!-- ── 顶栏 ── -->
<header>
  <div class="logo">手账日程本 <span>PLANNER</span></div>
  <div class="tab-group">
    <button class="tab-btn active" id="btn-month" onclick="switchView('month')">月视图</button>
    <button class="tab-btn"        id="btn-week"  onclick="switchView('week')">周视图</button>
    <button class="tab-btn"        id="btn-job"   onclick="switchView('job')">求职追踪</button>
  </div>
  <!-- Auth 区域 -->
  <div class="auth-area" id="auth-area">
    <!-- 由 JS 渲染 -->
  </div>
</header>

<main>

  <!-- ════ 月视图 ════ -->
  <div id="month-view" class="view active">

    <div class="calendar-area">
      <div class="month-nav">
        <button class="nav-btn" onclick="changeMonth(-1)" title="上个月">&#8249;</button>
        <button class="nav-btn" onclick="changeMonth(1)"  title="下个月">&#8250;</button>
        <h2 class="month-title" id="month-title"></h2>
        <button class="today-btn" onclick="goToday()">今天</button>
      </div>
      <table class="cal-grid" id="cal-grid">
        <thead>
          <tr>
            <th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th><th>日</th>
          </tr>
        </thead>
        <tbody id="cal-body"></tbody>
      </table>
    </div>

    <div class="v-divider" id="month-divider"></div>
    <aside class="todo-sidebar" id="month-todo-sidebar">
      <div class="sidebar-title" id="todo-title">本月待办</div>
      <div class="todo-input-row">
        <input class="todo-input" id="todo-input" type="text"
               placeholder="添加待办…" maxlength="80"
               onkeydown="if(event.key==='Enter')addTodo()" />
        <button class="todo-add-btn" onclick="addTodo()" title="添加">+</button>
      </div>
      <ul class="todo-list" id="todo-list"></ul>
    </aside>

    <div class="note-panel" id="note-panel">
      <div class="note-panel-inner">
        <div class="note-panel-header">
          <span class="note-panel-date" id="note-panel-date"></span>
          <button class="note-close-btn" onclick="closeNotePanel()" title="关闭">×</button>
        </div>
        <textarea class="note-textarea" id="note-textarea"
                  placeholder="写下今天的安排…"
                  oninput="saveNote()"></textarea>
        <div class="note-save-hint" id="note-save-hint">自动保存</div>
        <div class="np-todo-area">
          <div class="np-todo-title">今日待办</div>
          <div class="np-todo-input-row">
            <input class="np-todo-input" id="np-todo-input" placeholder="添加今日待办…" maxlength="60"
                   onkeydown="if(event.key==='Enter')addDailyTodo()" />
            <button class="todo-add-btn" onclick="addDailyTodo()" title="添加">+</button>
          </div>
          <ul class="np-todo-list" id="np-todo-list"></ul>
        </div>
      </div>
    </div>

  </div>

  <!-- ════ 周视图 ════ -->
  <div id="week-view" class="view">

    <div class="week-nav">
      <button class="nav-btn" onclick="changeWeek(-1)" title="上一周">&#8249;</button>
      <button class="nav-btn" onclick="changeWeek(1)"  title="下一周">&#8250;</button>
      <h2 class="week-title" id="week-title"></h2>
      <button class="today-btn" onclick="goToday()">今天</button>
    </div>

    <div class="week-layout">
      <div class="week-days-area">
        <div class="week-days-grid" id="week-days-grid"></div>
      </div>

      <div class="v-divider" id="week-divider"></div>
      <aside class="week-sidebar" id="week-sidebar-el">
        <div class="week-sidebar-title">本周备注</div>
        <textarea class="week-note-textarea" id="week-note-textarea"
                  placeholder="记录本周计划、反思或其他不限定某天的内容…"
                  oninput="saveWeekNote()"></textarea>
        <div class="week-note-hint">自动保存</div>
      </aside>
    </div>

  </div><!-- /week-view -->

  <!-- ════ 求职追踪视图 ════ -->
  <div id="job-view" class="view">
    <div class="job-stats-bar" id="job-stats-bar"></div>
    <div class="job-body">
      <div class="job-main-area">
        <div class="job-toolbar">
          <button class="job-add-btn" onclick="openPositionModal(null,null)">+ 新增投递</button>
          <button class="job-import-btn" onclick="document.getElementById('excel-file-input').click()">📂 导入 Excel</button>
          <input type="file" id="excel-file-input" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleExcelImport(this)">
          <select class="job-filter-select" id="job-filter-sel" onchange="renderJobList()">
            <option value="">全部状态</option>
            <option value="待回复">待回复</option>
            <option value="面试中">面试中</option>
            <option value="已拒绝">已拒绝</option>
            <option value="已Offer">已Offer</option>
          </select>
          <select class="job-filter-select" id="job-sort-sel" onchange="renderJobList()">
            <option value="newest">最新优先</option>
            <option value="priority">优先级</option>
            <option value="name">公司名称</option>
          </select>
        </div>
        <div id="job-card-list"></div>
        <div id="job-offer-cmp" class="job-offer-cmp" style="display:none;"></div>
      </div>
      <aside class="job-sidebar">
        <div class="sidebar-title">今日求职待办</div>
        <div class="todo-input-row">
          <input class="todo-input" id="jtodo-input" type="text"
                 placeholder="添加今日任务…" maxlength="80"
                 onkeydown="if(event.key==='Enter')addJobTodo()" />
          <button class="todo-add-btn" onclick="addJobTodo()" title="添加">+</button>
        </div>
        <ul class="todo-list" id="jtodo-list"></ul>
        <div class="sidebar-title"
             style="margin-top:18px;padding-top:14px;border-top:1px solid var(--border-light);">

<script>
/* ════════════════════════════════════════
   Firebase 初始化
════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyCvcnJWQxJYHkpHRq2I1xvWKieJNXDJNG4",
  authDomain: "agenda-cloud-data.firebaseapp.com",
  projectId: "agenda-cloud-data",
  storageBucket: "agenda-cloud-data.firebasestorage.app",
  messagingSenderId: "527842566755",
  appId: "1:527842566755:web:9401f61e28d207cd5a4e56"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.firestore();

/* ════════════════════════════════════════
   数据层（内存缓存 + 防抖云写入）
════════════════════════════════════════ */
let appData     = { notes: {}, todos: {}, weekNotes: {}, companies: [], jobDailyTodos: {}, dailyTodos: {} };
let currentUser = null;
let saveTimer   = null;

function loadData() {
  return appData;
}

function saveData(data) {
  appData = data;
  if (!currentUser) return;
  clearTimeout(saveTimer);
  setSyncBadge('syncing');
  saveTimer = setTimeout(() => writeToCloud(data), 1500);
}

async function loadDataFromCloud() {
  try {
    const snap = await db.doc(`users/${currentUser.uid}/planner/data`).get();
    appData = snap.exists ? snap.data() : { notes: {}, todos: {}, weekNotes: {}, companies: [], jobDailyTodos: {}, dailyTodos: {} };
    appData.notes         = appData.notes         || {};
    appData.todos         = appData.todos         || {};
    appData.weekNotes     = appData.weekNotes     || {};
    appData.companies     = appData.companies     || [];
    appData.jobDailyTodos = appData.jobDailyTodos || {};
    appData.dailyTodos    = appData.dailyTodos    || {};
    migrateJobsToCompanies(appData);
  } catch (e) {
    console.error('加载数据失败', e);
    appData = { notes: {}, todos: {}, weekNotes: {}, companies: [], jobDailyTodos: {}, dailyTodos: {} };
  }
}

async function writeToCloud(data) {
  if (!currentUser) return;
  try {
    await db.doc(`users/${currentUser.uid}/planner/data`).set(data);
    setSyncBadge('synced');
  } catch (e) {
    console.error('保存数据失败', e);
    setSyncBadge('error');
  }
}

/* ════════════════════════════════════════
   Auth
════════════════════════════════════════ */
function signIn() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(err => {
    console.error('登录失败', err);
  });
}

function signOut() {
  // 清空防抖，立即写入未保存的数据
  if (saveTimer) {
    clearTimeout(saveTimer);
    writeToCloud(appData);
  }
  auth.signOut();
}

auth.onAuthStateChanged(async user => {
  currentUser = user;
  if (user) {
    showLoadingOverlay(true);
    hideLoginOverlay();
    await loadDataFromCloud();
    showLoadingOverlay(false);
    renderAuthArea(user);
    renderCurrentView();
    setSyncBadge('synced');
  } else {
    appData = { notes: {}, todos: {}, weekNotes: {}, companies: [], jobDailyTodos: {}, dailyTodos: {} };
    renderAuthArea(null);
    showLoginOverlay();
    showLoadingOverlay(false);
  }
});

/* ════════════════════════════════════════
   UI — Auth 区域
════════════════════════════════════════ */
function renderAuthArea(user) {
  const area = document.getElementById('auth-area');
  if (user) {
    area.innerHTML = `
      <span class="sync-badge" id="sync-badge"></span>
      ${user.photoURL
        ? `<img class="user-avatar" src="${escHtml(user.photoURL)}" alt="头像" referrerpolicy="no-referrer">`
        : ''}
      <span class="user-name">${escHtml(user.displayName || user.email || '')}</span>
      <button class="auth-btn" onclick="signOut()" title="退出登录">退出</button>`;
  } else {
    area.innerHTML = `
      <button class="auth-btn signin" onclick="signIn()">
        <svg class="g-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
          <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
          <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
          <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
        </svg>
        Google 登录
      </button>`;
  }
}

function setSyncBadge(state) {
  const el = document.getElementById('sync-badge');
  if (!el) return;
  if (state === 'syncing') {
    el.className = 'sync-badge syncing';
    el.textContent = '同步中…';
  } else if (state === 'synced') {
    el.className = 'sync-badge synced';
    el.textContent = '已同步 ✓';
    setTimeout(() => { if (el) el.textContent = ''; }, 3000);
  } else if (state === 'error') {
    el.className = 'sync-badge';
    el.textContent = '同步失败';
  }
}

function showLoginOverlay()  { document.getElementById('login-overlay').classList.remove('hidden'); }
function hideLoginOverlay()  { document.getElementById('login-overlay').classList.add('hidden'); }
function showLoadingOverlay(v) {
  document.getElementById('loading-overlay').classList.toggle('hidden', !v);
}

/* ════════════════════════════════════════
   状态
════════════════════════════════════════ */
const today = new Date();
today.setHours(0, 0, 0, 0);

let curYear      = today.getFullYear();
let curMonth     = today.getMonth();
let curWeekStart = getWeekStart(today);
let selectedDate = null;
let curView      = 'month';

/* ════════════════════════════════════════
   工具函数
════════════════════════════════════════ */
function fmtDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtMonthKey(y, m) {
  return `${y}-${String(m+1).padStart(2,'0')}`;
}

function getWeekStart(d) {
  const date = new Date(d);
  date.setHours(0, 0, 0, 0);
  const day  = date.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  date.setDate(date.getDate() + diff);
  return date;
}

function fmtWeekKey(weekStart) {
  const d    = new Date(weekStart);
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const weekNo = Math.ceil((((d - jan1) / 86400000) + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(weekNo).padStart(2,'0')}`;
}

function getISOWeek(d) {
  const date = new Date(d);
  date.setHours(0, 0, 0, 0);
  date.setDate(date.getDate() + 3 - ((date.getDay() + 6) % 7));
  const jan4 = new Date(date.getFullYear(), 0, 4);
  return 1 + Math.round(((date - jan4) / 86400000 - 3 + ((jan4.getDay() + 6) % 7)) / 7);
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

const CN_WEEKDAYS = ['一','二','三','四','五','六','日'];
const CN_MONTHS   = ['一月','二月','三月','四月','五月','六月',
                     '七月','八月','九月','十月','十一月','十二月'];

/* ════════════════════════════════════════
   视图切换
════════════════════════════════════════ */
function switchView(v) {
  curView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.getElementById(v + '-view').classList.add('active');
  document.getElementById('btn-month').classList.toggle('active', v === 'month');
  document.getElementById('btn-week').classList.toggle('active',  v === 'week');
  document.getElementById('btn-job').classList.toggle('active',   v === 'job');
  renderCurrentView();
}

function renderCurrentView() {
  if      (curView === 'month') renderMonth();
  else if (curView === 'week')  renderWeek();
  else if (curView === 'job')   renderJobView();
}

/* ════════════════════════════════════════
   月视图
════════════════════════════════════════ */
function renderMonth() {
  document.getElementById('month-title').textContent =
    `${curYear} 年 ${CN_MONTHS[curMonth]}`;
  document.getElementById('todo-title').textContent =
    `${curMonth+1} 月待办`;

  const data = loadData();
  const body = document.getElementById('cal-body');
  body.innerHTML = '';

  const firstDay    = new Date(curYear, curMonth, 1);
  let   startDow    = firstDay.getDay();
  startDow = (startDow === 0) ? 6 : startDow - 1;

  const daysInMonth = new Date(curYear, curMonth + 1, 0).getDate();
  const totalCells  = Math.ceil((startDow + daysInMonth) / 7) * 7;

  for (let i = 0; i < totalCells; i += 7) {
    const tr = document.createElement('tr');
    for (let j = 0; j < 7; j++) {
      const cellIdx = i + j;
      const dayNum  = cellIdx - startDow + 1;
      const td      = document.createElement('td');

      if (dayNum < 1 || dayNum > daysInMonth) {
        td.classList.add('other-month');
        if (dayNum < 1) {
          const prevLast = new Date(curYear, curMonth, 0).getDate();
          td.innerHTML = `<span class="day-num">${prevLast + dayNum}</span>`;
        } else {
          td.innerHTML = `<span class="day-num">${dayNum - daysInMonth}</span>`;
        }
      } else {
        const d    = new Date(curYear, curMonth, dayNum);
        const key  = fmtDateKey(d);
        const note = data.notes[key] || '';
        const isToday    = d.getTime() === today.getTime();
        const isSunday   = d.getDay() === 0;
        const isSelected = selectedDate && selectedDate.getTime() === d.getTime();

        if (isToday)    td.classList.add('today');
        if (isSelected) td.classList.add('selected');

        const dtodos  = (data.dailyTodos || {})[key] || [];
        const pending = dtodos.filter(t => !t.done).length;
        td.innerHTML = `
          <span class="day-num${isSunday ? ' sunday' : ''}">${dayNum}</span>
          <div class="day-note-preview">${escHtml(note)}</div>
          ${pending > 0 ? `<div class="day-todo-count">✓ ${pending}项待办</div>` : ''}`;

        td.addEventListener('click', () => openNotePanel(d));
      }

      tr.appendChild(td);
    }
    body.appendChild(tr);
  }

  renderTodos();
}

function changeMonth(delta) {
  curMonth += delta;
  if (curMonth > 11) { curMonth = 0;  curYear++; }
  if (curMonth <  0) { curMonth = 11; curYear--; }
  closeNotePanel();
  renderMonth();
}

/* ════════════════════════════════════════
   备注面板
════════════════════════════════════════ */
function openNotePanel(d) {
  selectedDate = d;
  const data = loadData();
  const key  = fmtDateKey(d);

  document.getElementById('note-panel-date').textContent =
    `${d.getMonth()+1} 月 ${d.getDate()} 日`;
  document.getElementById('note-textarea').value = data.notes[key] || '';
  document.getElementById('note-panel').classList.add('open');
  dailyTodoKey = key;
  renderDailyTodosPanel();

  document.querySelectorAll('.cal-grid td').forEach(td => td.classList.remove('selected'));
  document.querySelectorAll('.cal-grid tbody td:not(.other-month)').forEach(td => {
    const numEl = td.querySelector('.day-num');
    if (numEl && parseInt(numEl.textContent) === d.getDate()) {
      td.classList.add('selected');
    }
  });

  document.getElementById('note-textarea').focus();
}

function closeNotePanel() {
  selectedDate = null;
  dailyTodoKey = null;
  document.getElementById('note-panel').classList.remove('open');
  document.querySelectorAll('.cal-grid td').forEach(td => td.classList.remove('selected'));
}

function saveNote() {
  if (!selectedDate) return;
  const data = loadData();
  const key  = fmtDateKey(selectedDate);
  const val  = document.getElementById('note-textarea').value;
  if (val.trim()) {
    data.notes[key] = val;
  } else {
    delete data.notes[key];
  }
  saveData(data);
  // 刷新月视图预览
  document.querySelectorAll('.cal-grid tbody td:not(.other-month)').forEach(td => {
    const numEl = td.querySelector('.day-num');
    if (numEl && parseInt(numEl.textContent) === selectedDate.getDate()) {
      const prev = td.querySelector('.day-note-preview');
      if (prev) prev.textContent = val;
    }
  });
}

/* ════════════════════════════════════════
   待办清单
════════════════════════════════════════ */
function addTodo() {
  const input = document.getElementById('todo-input');
  const text  = input.value.trim();
  if (!text) return;

  const data = loadData();
  const mkey = fmtMonthKey(curYear, curMonth);
  if (!data.todos[mkey]) data.todos[mkey] = [];
  data.todos[mkey].push({ id: Date.now(), text, done: false });
  saveData(data);
  input.value = '';
  renderTodos();
}

function toggleTodo(mkey, id) {
  const data = loadData();
  const item = (data.todos[mkey] || []).find(t => t.id === id);
  if (item) item.done = !item.done;
  saveData(data);
  renderTodos();
}

function deleteTodo(mkey, id) {
  const data = loadData();
  if (data.todos[mkey]) {
    data.todos[mkey] = data.todos[mkey].filter(t => t.id !== id);
  }
  saveData(data);
  renderTodos();
}

function renderTodos() {
  const data  = loadData();
  const mkey  = fmtMonthKey(curYear, curMonth);
  const items = data.todos[mkey] || [];
  const ul    = document.getElementById('todo-list');
  ul.innerHTML = '';

  items.forEach(item => {
    const li = document.createElement('li');

function renderWeek() {
  const ws = curWeekStart;
  const we = new Date(ws); we.setDate(we.getDate() + 6);

  const fmtD = d => `${d.getMonth()+1}月${d.getDate()}日`;
  document.getElementById('week-title').innerHTML =
    `${ws.getFullYear()} 年 第 ${getISOWeek(ws)} 周 <sub>${fmtD(ws)} — ${fmtD(we)}</sub>`;

  const data = loadData();
  const grid = document.getElementById('week-days-grid');
  grid.innerHTML = '';

  for (let i = 0; i < 7; i++) {
    const d        = new Date(ws); d.setDate(ws.getDate() + i);
    const key      = fmtDateKey(d);
    const isToday  = d.getTime() === today.getTime();
    const isSunday = d.getDay() === 0;

    const col = document.createElement('div');
    col.className = 'week-day-col' +
                    (isToday  ? ' today'  : '') +
                    (isSunday ? ' sunday' : '');

    col.innerHTML = `
      <div class="week-day-header">
        <span class="week-day-name">周${CN_WEEKDAYS[i]}</span>
        <span class="week-day-num">${d.getDate()}</span>
      </div>
      <textarea class="week-day-textarea"
                placeholder="今日安排…"
                data-key="${key}"
                oninput="saveDayNote(this)">${escHtml(data.notes[key] || '')}</textarea>
      <div class="week-day-todo-area">
        <div class="week-day-todo-input-row">
          <input class="week-day-todo-input" data-key="${key}" placeholder="添加待办…"
                 onkeydown="if(event.key==='Enter')addWeekDailyTodo('${key}')">
          <button class="week-day-todo-add" onclick="addWeekDailyTodo('${key}')" title="添加">+</button>
        </div>
        <ul class="week-day-todo-list" data-key="${key}"></ul>
      </div>`;

    grid.appendChild(col);
    renderWeekDayTodos(key);
  }

  const wkey = fmtWeekKey(ws);
  document.getElementById('week-note-textarea').value       = data.weekNotes[wkey] || '';
  document.getElementById('week-note-textarea').dataset.key = wkey;
}

function saveDayNote(textarea) {
  const data = loadData();
  const key  = textarea.dataset.key;
  const val  = textarea.value;
  if (val.trim()) {
    data.notes[key] = val;
  } else {
    delete data.notes[key];
  }

}

function saveWeekNote() {
  const ta  = document.getElementById('week-note-textarea');

function changeWeek(delta) {
  curWeekStart = new Date(curWeekStart);
  curWeekStart.setDate(curWeekStart.getDate() + delta * 7);

}

function fmtInterviewLine(coName, posTitle, iv) {
  const timePart = iv.time ? ` ${iv.time}` : '';
  return `【面试】${coName} · ${posTitle} · ${iv.round}${timePart} · ${iv.format}`;
}

function syncInterviewsToNote(dateKey, data) {
  const lines = [];
  (data.companies || []).forEach(co => {
    (co.positions || []).forEach(pos => {
      (pos.interviews || []).forEach(iv => {
        if (iv.date === dateKey) lines.push(fmtInterviewLine(co.name, pos.title, iv));
      });
    });
  });

  const current = data.notes[dateKey] || '';
  const nonIv   = current.split('\n').filter(l => !l.startsWith('【面试】'));
  const all     = [...nonIv.filter(l => l.trim()), ...lines].join('\n').trim();

  if (all) data.notes[dateKey] = all;
  else     delete data.notes[dateKey];
}

function refreshMonthCellTodoCount(key) {

  // find the cell for this dateKey and update its count badge
  const d = new Date(key + 'T00:00:00');
  if (d.getFullYear() !== curYear || d.getMonth() !== curMonth) return;
  document.querySelectorAll('.cal-grid tbody td:not(.other-month)').forEach(td => {
    const numEl = td.querySelector('.day-num');
    if (numEl && parseInt(numEl.textContent) === d.getDate()) {

/* ════════════════════════════════════════
   可拖动分割线
════════════════════════════════════════ */
function initDivider(dividerId, targetId, side, minLeft, minRight) {
  const divider = document.getElementById(dividerId);
  const target  = document.getElementById(targetId);
  if (!divider || !target) return;

  let startX, startW;

  divider.addEventListener('mousedown', e => {
    e.preventDefault();
    startX = e.clientX;
    startW = target.getBoundingClientRect().width;
    divider.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';

    const onMove = ev => {
      const dx   = ev.clientX - startX;
      let   newW;
      if (side === 'right') {
        newW = Math.max(minRight, startW - dx);
        const parent = target.closest('.week-layout, #month-view');
        if (parent) {
          const parentW = parent.getBoundingClientRect().width;
          newW = Math.min(newW, parentW - minLeft - 5);
        }
      } else {
        newW = Math.max(minLeft, startW + dx);
        const parent = target.closest('.week-layout, #month-view');
        if (parent) {
          const parentW = parent.getBoundingClientRect().width;
          newW = Math.min(newW, parentW - minRight - 5);
        }
      }
      target.style.width = newW + 'px';
      target.style.flexShrink = '0';
    };

    const onUp = () => {
      divider.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    };

    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
}

/* ── 数据迁移：jobs[] → companies[] ── */
function migrateJobsToCompanies(data) {
  if (!data.jobs || !data.jobs.length) return;
  if (data.companies && data.companies.length) return;
  const coMap = {};
  data.jobs.forEach(job => {
    const name = (job.company || '未知公司').trim();
    if (!coMap[name]) {
      coMap[name] = { id: Date.now() + Math.random(), name, url: '', notes: '', priority: '中', positions: [] };
    }
    coMap[name].positions.push({
      id: job.id, title: job.position || '', city: '',
      applyDate: job.applyDate || '', channel: job.channel || '',
      status: job.status || '待回复', deadline: job.deadline || null,
      interviews: job.interviews || [], offer: job.offer || null, notes: job.notes || ''
    });
  });
  data.companies = Object.values(coMap);
}

/* ── 工具 ── */
function daysUntil(dateStr) {
  if (!dateStr) return Infinity;
  const t = new Date(dateStr + 'T00:00:00');
  return Math.round((t - today) / 86400000);
}

/* ── 统计面板 ── */
function renderJobStats() {
  const cos = loadData().companies || [];
  let allPos = [];
  cos.forEach(c => { allPos = allPos.concat(c.positions || []); });
  const posTotal  = allPos.length;
  const replied   = allPos.filter(p => p.status !== '待回复').length;
  const replyR    = posTotal ? Math.round(replied / posTotal * 100) : 0;
  const intvCount = allPos.filter(p => p.status === '面试中').length;
  const offerCnt  = allPos.filter(p => p.status === '已Offer').length;
  const rejCnt    = allPos.filter(p => p.status === '已拒绝').length;
  const passBase  = offerCnt + rejCnt;
  const passR     = passBase ? Math.round(offerCnt / passBase * 100) : 0;
  document.getElementById('job-stats-bar').innerHTML =
    [['投递公司数', cos.length], ['岗位总数', posTotal], ['回复率', replyR + '%'],
     ['进行中', intvCount], ['Offer 数', offerCnt], ['面试通过率', passR + '%']]
    .map(([l, n]) => `<div class="job-stat-item"><span class="job-stat-num">${n}</span><span class="job-stat-label">${l}</span></div>`).join('');
}

/* ── 公司卡片列表 ── */
function renderJobList() {
  const data = loadData();
  let cos = (data.companies || []).slice();
  const fv = (document.getElementById('job-filter-sel') || {}).value || '';
  const sv = (document.getElementById('job-sort-sel')   || {}).value || 'newest';

  if (fv) {
    cos = cos.map(c => ({ ...c, positions: (c.positions || []).filter(p => p.status === fv) }))
             .filter(c => c.positions.length > 0);
  }
  const PO = { '高': 0, '中': 1, '低': 2 };
  if (sv === 'priority') {
    cos.sort((a, b) => (PO[a.priority] ?? 1) - (PO[b.priority] ?? 1));
  } else if (sv === 'name') {
    cos.sort((a, b) => a.name.localeCompare(b.name));
  } else {
    cos.sort((a, b) => {
      const aMax = Math.max(...(a.positions || []).map(p => p.id || 0), 0);
      const bMax = Math.max(...(b.positions || []).map(p => p.id || 0), 0);
      return bMax - aMax;
    });
  }

  const container = document.getElementById('job-card-list');
  if (!cos.length) {
    container.innerHTML = `<div style="text-align:center;padding:52px 0;color:var(--ink-light);font-size:13px;line-height:2.2">暂无投递记录<br><span style="font-size:11px">点击上方「+ 新增投递」开始记录</span></div>`;
  } else {
    container.innerHTML = cos.map(buildCoCardHTML).join('');
    if (expandedCoId) {
      const el = container.querySelector(`.co-card[data-id="${expandedCoId}"]`);
      if (el) el.classList.add('expanded');
    }
    if (expandedPosId) {
      const el = container.querySelector(`.pos-card[data-id="${expandedPosId}"]`);
      if (el) el.classList.add('expanded');
    }
    openDebriefs.forEach(key => {
      const el = document.getElementById(`db-${key}`);
      if (el) el.classList.add('open');
    });
  }
  renderOfferTable();
}

      ${offerHtml}
      <div class="job-sect-title" style="margin-top:10px;">备注</div>

function savePosModal() {
  const title = document.getElementById('pf-title').value.trim();
  if (!title) { alert('请填写应聘职位'); return; }

  const coName = document.getElementById('pf-company').value.trim();
  if (!editingPosId && !coName) { alert('请填写公司名称'); return; }

  const status = document.getElementById('pf-status').value;
  const offer  = status === '已Offer' ? {
    salary:        document.getElementById('pf-salary').value.trim(),
    level:         document.getElementById('pf-level').value.trim(),
    location:      document.getElementById('pf-location').value.trim(),
    benefits:      document.getElementById('pf-benefits').value.trim(),
    offerDeadline: document.getElementById('pf-offerdeadline').value,
    notes:         document.getElementById('pf-offernotes').value.trim()
  } : null;

  const data = loadData();
  data.companies = data.companies || [];

  if (editingPosId && editingCoId) {
    // Edit existing position
    const co  = data.companies.find(c => c.id === editingCoId);
    const pos = co && co.positions.find(p => p.id === editingPosId);
    if (pos) {
      pos.title     = title;
      pos.city      = document.getElementById('pf-city').value.trim();
      pos.applyDate = document.getElementById('pf-applydate').value;
      pos.channel   = document.getElementById('pf-channel').value.trim();
      pos.status    = status;
      pos.deadline  = document.getElementById('pf-deadline').value || null;
      pos.offer     = offer;
    }
    // Also update co url if provided
    if (co) co.url = document.getElementById('pf-url').value.trim() || co.url;
  } else {
    // New position: find or create company
    let co = data.companies.find(c => c.name.toLowerCase() === coName.toLowerCase());
    if (!co) {
      co = { id: Date.now(), name: coName, url: document.getElementById('pf-url').value.trim(), notes: '', priority: '中', positions: [] };
      data.companies.push(co);
    } else if (document.getElementById('pf-url').value.trim()) {
      co.url = co.url || document.getElementById('pf-url').value.trim();
    }
    co.positions.push({
      id: Date.now() + Math.random(), title,
      city:      document.getElementById('pf-city').value.trim(),
      applyDate: document.getElementById('pf-applydate').value,
      channel:   document.getElementById('pf-channel').value.trim(),
      status, deadline: document.getElementById('pf-deadline').value || null,
      interviews: [], offer, notes: ''
    });
    expandedCoId = co.id;
  }

  saveData(data);
  closePosModal();
  renderJobView();
}

function deletePosition(coId, posId) {

  const data = loadData();

function deleteInterview(coId, posId, idx) {
  const data = loadData();
  const co   = (data.companies || []).find(c => c.id === coId);
  const pos  = co && (co.positions || []).find(p => p.id === posId);
  if (!pos) return;
  const deletedDate = pos.interviews[idx] ? pos.interviews[idx].date : null;
  pos.interviews.splice(idx, 1);
  const newOpen = new Set();
  openDebriefs.forEach(key => {
    const [pid, i] = key.split('-').map(Number);
    if (pid !== posId) { newOpen.add(key); return; }
    if (i < idx)  newOpen.add(key);
    if (i > idx)  newOpen.add(`${pid}-${i - 1}`);
  });
  openDebriefs.clear();
  newOpen.forEach(k => openDebriefs.add(k));
  // Sync deleted interview out of calendar note
  if (deletedDate) syncInterviewsToNote(deletedDate, data);
  saveData(data);
  renderJobList(); renderJobStats();
  const coEl = document.querySelector(`.co-card[data-id="${coId}"]`);
  if (coEl && expandedCoId === coId) {
    coEl.classList.add('expanded');
    const posEl = document.querySelector(`.pos-card[data-id="${posId}"]`);
    if (posEl && expandedPosId === posId) {
      posEl.classList.add('expanded');
      openDebriefs.forEach(k => { const e = document.getElementById(`db-${k}`); if (e) e.classList.add('open'); });
    }
  }
}

/* ── Excel 导入 ── */
function handleExcelImport(input) {
  const file = input.files[0];
  if (!file) return;
  input.value = '';
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb   = XLSX.read(e.target.result, { type: 'array', cellDates: true });
      const ws   = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
      const COL  = { '公司':'company','招聘网址':'url','实际投递岗位':'title','城市':'city',
                     '投递日期':'applyDate','状态':'status','截止日期':'deadline' };
      const mapped = rows.map(row => {
        const r = {};
        Object.keys(row).forEach(k => { const ck = COL[k.trim()]; if (ck) r[ck] = String(row[k] || '').trim(); });
        return r;
      }).filter(r => r.company && r.title);

      // Group by company
      const coMap = {};
      mapped.forEach(r => {
        const n = r.company;
        if (!coMap[n]) coMap[n] = { name: n, url: '', positions: [] };
        if (r.url && !coMap[n].url) coMap[n].url = r.url;
        coMap[n].positions.push({
          title: r.title, city: r.city || '', applyDate: r.applyDate || '',
          status: r.status || '待回复', deadline: r.deadline || null
        });
      });

      pendingImport = Object.values(coMap);
      if (!pendingImport.length) { alert('未找到有效数据，请确认列名是否正确'); return; }
      showImportPreview();
    } catch (err) {
      alert('文件解析失败：' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function showImportPreview() {
  const data = loadData();
  const existingCos = data.companies || [];
  let totalPos = 0, dupCount = 0;
  const rows = [];
  pendingImport.forEach(co => {
    co.positions.forEach(pos => {
      totalPos++;
      const existCo = existingCos.find(c => c.name === co.name);
      const isDup   = existCo && existCo.positions.some(p => p.title === pos.title);
      if (isDup) dupCount++;
      rows.push({ co: co.name, title: pos.title, city: pos.city, isDup });
    });
  });

  document.getElementById('import-summary').textContent =
    `将导入 ${pendingImport.length} 家公司，共 ${totalPos} 个岗位（${dupCount} 条可能重复）`;
  document.getElementById('import-preview-list').innerHTML = rows.map(r => `
    <div class="import-preview-row">
      <span class="import-preview-co">${escHtml(r.co)}</span>
      <span class="import-preview-pos">${escHtml(r.title)}</span>
      ${r.city ? `<span class="import-preview-city">${escHtml(r.city)}</span>` : ''}
      ${r.isDup ? `<span class="import-preview-dup">可能重复</span>` : ''}
    </div>`).join('');
  document.getElementById('import-modal-overlay').classList.remove('hidden');
}

function closeImportModal() {
  pendingImport = [];
  document.getElementById('import-modal-overlay').classList.add('hidden');
}

function confirmImport() {
  const data = loadData();
  data.companies = data.companies || [];
  let importedCo = 0, importedPos = 0, skipped = 0;

  pendingImport.forEach(newCo => {
    let existCo = data.companies.find(c => c.name === newCo.name);
    if (!existCo) {
      existCo = { id: Date.now() + Math.random(), name: newCo.name, url: newCo.url || '', notes: '', priority: '中', positions: [] };
      data.companies.push(existCo);
      importedCo++;
    } else if (newCo.url && !existCo.url) {
      existCo.url = newCo.url;
    }
    newCo.positions.forEach(pos => {
      const isDup = existCo.positions.some(p => p.title === pos.title);
      if (isDup) { skipped++; return; }
      existCo.positions.push({ id: Date.now() + Math.random(), ...pos, interviews: [], offer: null, notes: '' });
      importedPos++;
    });
  });

  saveData(data);
  closeImportModal();
  renderJobView();
  alert(`成功导入 ${importedCo} 家公司，${importedPos} 个岗位，跳过 ${skipped} 条重复`);
}

  const data  = loadData();

  const items = (data.jobDailyTodos || {})[key] || [];

  if (!ul) return;
  ul.innerHTML = '';
  items.forEach(item => {
    const li = document.createElement('li');
    li.className = 'todo-item' + (item.done ? ' done' : '');
    li.innerHTML = `
      <input type="checkbox" id="jt${item.id}" ${item.done ? 'checked' : ''}
             onchange="toggleJobTodo('${key}', ${item.id})">
      <label for="jt${item.id}">${escHtml(item.text)}</label>
      <button class="todo-del-btn" onclick="deleteJobTodo('${key}', ${item.id})" title="删除">×</button>`;
    ul.appendChild(li);
  });
}

/* ── 截止提醒 ── */
function renderDeadlineReminders() {
  const cos   = loadData().companies || [];
  const items = [];

  cos.forEach(co => {
    (co.positions || []).forEach(pos => {
      if (pos.deadline) {
        const d = daysUntil(pos.deadline);
        if (d <= 7) items.push({ label: `${co.name} · ${pos.title} 投递截止`, days: d });
      }
      if (pos.offer && pos.offer.offerDeadline) {
        const d = daysUntil(pos.offer.offerDeadline);
        if (d <= 7) items.push({ label: `${co.name} · ${pos.title} Offer截止`, days: d });
      }
    });
  });

  items.sort((a, b) => a.days - b.days);

  const container = document.getElementById('job-deadline-list');
  if (!container) return;
  if (!items.length) {
    container.innerHTML = `<div style="font-size:12px;color:var(--ink-light);padding:8px 0;">暂无临近截止日期</div>`;
    return;
  }

  container.innerHTML = items.map(item => {
    const cls     = item.days < 0 ? 'expired' : item.days <= 3 ? 'urgent' : '';
    const dayText = item.days < 0 ? '已过期'
                  : item.days === 0 ? '今天截止'
                  : `还剩 ${item.days} 天`;
    return `<div class="job-deadline-item ${cls}">
      <div>${escHtml(item.label)}</div>
      <div class="job-deadline-days">${dayText}</div>
    </div>`;
  }).join('');
}

/* ── 初始化可拖动分割线（DOM 就绪后） ── */
document.addEventListener('DOMContentLoaded', () => {
  // 周视图：左侧日程区域 ↔ 右侧备注侧栏（调整侧栏宽度）
  initDivider('week-divider', 'week-sidebar-el', 'right', 400, 140);
  // 月视图：日历区域 ↔ 待办侧栏（调整侧栏宽度）
  initDivider('month-divider', 'month-todo-sidebar', 'right', 400, 140);
});
</script>
</body>
